apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartops-engine
  namespace: default
  labels:
    app: smartops-engine
    version: v2.0.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smartops-engine
  template:
    metadata:
      labels:
        app: smartops-engine
    spec:
      containers:
      - name: smartops-engine
        image: smartops-engine:v2.0.0
        ports:
        - containerPort: 9000
        env:
        - name: USER_SERVICE_URL
          value: "http://user-service:8000"
        - name: ORDER_SERVICE_URL
          value: "http://order-service:8000"
        - name: PAYMENT_SERVICE_URL
          value: "http://payment-service:8000"
        - name: PROMETHEUS_URL
          value: "http://prometheus-service:9090"
        livenessProbe:
          httpGet:
            path: /health
            port: 9000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 9000
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: "1000m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: user_service:latest
        ports:
        - containerPort: 8000
        env:
        - name: ORDER_SERVICE_URL
          value: "http://order-service:8000"
        - name: REDIS_HOST
          value: "redis-service"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
          requests:
            cpu: "250m"
            memory: "128Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: order_service:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "postgresql://user:password@db-service:5432/orders_db"
        - name: PAYMENT_SERVICE_URL
          value: "http://payment-service:8000"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
          requests:
            cpu: "250m"
            memory: "128Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
      - name: payment-service
        image: payment_service:latest
        ports:
        - containerPort: 8000
        env:
        - name: FAILURE_RATE
          value: "0.05"
        - name: MAX_LATENCY
          value: "0.3"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
          requests:
            cpu: "250m"
            memory: "128Mi"
